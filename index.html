<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    min-height:85vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding-top:75px;
}

h1{
    font-size:5rem;
    letter-spacing:12px;
    text-shadow:0 0 25px rgba(255,255,255,0.15);
}

.alias{
    color:#6e7681;

    margin-top:5px;
    margin-bottom:35px;

.bio{
    color:#6e7681;
    margin-bottom:35px;
    font-size:1rem;

.section-title{
    margin:25px 0 15px;
    color:#8b949e;
    text-transform:uppercase;
    letter-spacing:3px;
    font-size:0.85rem;
}

.links{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.links a{
    text-decoration:none;
    color:white;
    border:1px solid #30363d;
    padding:12px 24px;
    border-radius:10px;
    transition:all 0.3s ease;
    min-width:170px;
}

.links a:hover{
    background:white;
    color:#0d1117;
    transform:translateY(-3px);
}

.spacer{
    flex:1;
}

.quote{
    font-size:1.3rem;
    color:#8b949e;
    font-style:italic;
    margin-bottom:10px;
}

.footer{
    color:#6e7681;
    font-size:0.9rem;
}
