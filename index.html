<title>Praav's</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d1117;
    color:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    max-width:800px;
    padding:20px;
}

h1{
    font-size:6rem;
    letter-spacing:8px;
    margin-bottom:10px;
}

.quote{
    font-size:1.5rem;
    color:#8b949e;
    margin-bottom:40px;
    font-style:italic;
}

.links{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.links a{
    text-decoration:none;
    color:white;
    border:1px solid #30363d;
    padding:12px 24px;
    border-radius:10px;
    transition:0.3s;
    min-width:160px;
}

.links a:hover{
    background:white;
    color:#0d1117;
    transform:translateY(-2px);
}

.footer{
    margin-top:40px;
    color:#6e7681;
    font-size:0.9rem;
}
</style>
